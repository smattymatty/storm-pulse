name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: docker
    container:
      image: python:3.12-slim
      volumes:
        - pip-cache:/pip-cache

    steps:
      - name: Install git
        run: apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*

      - name: Checkout code
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" "https://any:${GITHUB_TOKEN}@git.stormdevelopments.ca/${GITHUB_REPOSITORY}.git" .

      - name: Install dependencies
        run: pip install --cache-dir /pip-cache -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Type check
        run: mypy .
