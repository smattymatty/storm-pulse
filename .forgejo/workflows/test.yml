name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: docker
    container:
      image: python:3.12-slim
      volumes:
        - pip-cache:/pip-cache

    steps:
      - name: Install git
        run: apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*

      - name: Checkout code
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "$BRANCH" "https://any:${GITHUB_TOKEN}@git.stormdevelopments.ca/${GITHUB_REPOSITORY}.git" .

      - name: Install dependencies
        run: pip install --cache-dir /pip-cache -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Type check
        run: mypy .

  # CORE-001 fitness suite. Separate job for a separate signal:
  # a red `fitness` means an architectural or security invariant was
  # crossed, distinct from a behavioural test failure.
  fitness:
    runs-on: docker
    container:
      image: python:3.12-slim
      volumes:
        - pip-cache:/pip-cache

    steps:
      - name: Install git
        run: apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*

      - name: Checkout code
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "$BRANCH" "https://any:${GITHUB_TOKEN}@git.stormdevelopments.ca/${GITHUB_REPOSITORY}.git" .

      - name: Install dependencies
        run: pip install --cache-dir /pip-cache -e ".[dev]"

      - name: Layer topology (import-linter - Function 1)
        run: lint-imports

      - name: Custom fitness checks (Functions 2-4)
        run: python -m fitness
