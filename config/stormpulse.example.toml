# Storm Pulse Agent Configuration
# Copy to /etc/stormpulse/stormpulse.toml and edit.

[agent]
id = "vps-toronto-01"
pulse_token = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"  # from Server.pulse_token in dashboard
# disabled_commands = ["docker_logs"]  # optional, removes commands from the registry

[dashboard]
url = "wss://stormdevelopments.ca/ws/pulse/"
reconnect_min_seconds = 3
reconnect_max_seconds = 60
heartbeat_interval_seconds = 30

[tls]
ca_cert = "/etc/stormpulse/ca.pem"
client_cert = "/etc/stormpulse/agent.pem"
client_key = "/etc/stormpulse/agent-key.pem"

[auth]
hmac_secret = "/etc/stormpulse/hmac.key"
command_max_age_seconds = 60

[metrics]
push_interval_seconds = 15
collect_containers = true

[project]
project_dir = "/home/deploy/stormdevelopments"
compose_file = "/home/deploy/stormdevelopments/docker-compose.yml"
docker_service_name = "web"
# env_file = "/home/deploy/stormdevelopments/.env"  # optional, passed as --env-file to docker compose

[storage]
db_path = "/opt/stormpulse/data/stormpulse.db"

# ---------------------------------------------------------------------------
# Custom commands (optional)
# ---------------------------------------------------------------------------
# Built-in commands: git_pull, docker_logs
# Add your own commands below. Each [commands.<name>] defines a whitelisted
# subprocess call. Use placeholders like {project_dir}, {compose_file},
# {env_file}, and {docker_service_name} — they resolve from [project] config.
#
# Deploy commands — uncomment and adjust for your stack:
#
# [commands.docker_build]
# group = "deploy"
# command = ["/usr/bin/docker", "compose", "--env-file", "{env_file}", "-f", "{compose_file}", "build"]
# timeout = 300
# description = "Build Docker images"
#
# [commands.docker_down]
# group = "deploy"
# command = ["/usr/bin/docker", "compose", "--env-file", "{env_file}", "-f", "{compose_file}", "down"]
# timeout = 60
# requires_confirmation = true
# description = "Stop and remove containers"
#
# [commands.docker_up]
# group = "deploy"
# command = ["/usr/bin/docker", "compose", "--env-file", "{env_file}", "-f", "{compose_file}", "up", "-d"]
# timeout = 120
# description = "Start containers in detached mode"
#
# [commands.django_migrate]
# group = "deploy"
# command = ["/usr/bin/docker", "compose", "--env-file", "{env_file}", "-f", "{compose_file}", "exec", "{docker_service_name}", "python", "manage.py", "migrate"]
# timeout = 120
# description = "Run Django database migrations"
#
# Other examples:
#
# [commands.restart_caddy]
# group = "maintenance"
# command = ["/usr/bin/systemctl", "restart", "caddy.service"]
# timeout = 30
# requires_confirmation = true
# description = "Restart Caddy reverse proxy"
#
# Commands can declare overridable parameters with regex validation.
# The dashboard sends runtime overrides in the params dict; the agent
# validates them before substituting into the command template.
#
# [commands.service_logs]
# group = "diagnostics"
# command = ["/usr/bin/docker", "compose", "-f", "{compose_file}", "logs", "--tail", "{lines}", "{service}"]
# timeout = 30
# description = "Show recent logs for a specific service"
#
# [commands.service_logs.params.service]
# placeholder = "service"
# default = "web"
# pattern = "[a-zA-Z0-9_-]+"
# description = "Docker Compose service name"
#
# [commands.service_logs.params.lines]
# placeholder = "lines"
# default = "100"
# pattern = "[0-9]{1,5}"
# description = "Number of log lines to show"
